services:
  # ---------------------------------------------------------------------------
  # フロントエンド (React)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .. # プロジェクトのルートディレクトリ（pl_react/）を基準にする
      dockerfile: frontend/Dockerfile
    container_name: web-app-frontend
    volumes:
      # ホストの frontend フォルダをコンテナの /workspace/frontend にマウント
      - ../frontend:/workspace/frontend
      # node_modulesをホスト側に同期させない
      - /workspace/frontend/node_modules
    working_dir: /workspace/frontend
    ports:
      - "3000:3000" # Reactの開発サーバー用ポート
    tty: true # コンテナを常時起動させるための設定
    init: true
    command: sh -c "npm install && npm run dev" # コンテナ起動時にVite開発サーバーを自動起動
    networks:
      - app-net # ★共通ネットワークに参加

  # ---------------------------------------------------------------------------
  # バックエンド (Spring Boot)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .. # プロジェクトのルートディレクトリを基準にする
      dockerfile: backend/Dockerfile
    container_name: web-app-backend
    volumes:
      # ホストの backend フォルダをコンテナの /workspace/backend にマウント
      - ../backend:/workspace/backend
      # Gradleのキャッシュを永続化
      - gradle-cache:/home/vscode/.gradle
    working_dir: /workspace/backend
    ports:
      - "8080:8080" # Spring Bootのアプリケーション用ポート
    tty: true # コンテナを常時起動させるための設定
    command: sh -c "cd demo && ./gradlew bootRun" # コンテナ起動時にSpring Bootを自動起動
    networks:
      - app-net # ★共通ネットワークに参加

# バックエンドのビルドキャッシュなどを保持するための共通ボリューム定義
volumes:
  gradle-cache:

    # ★共通のブリッジネットワークを定義
networks:
  app-net:
    driver: bridge
